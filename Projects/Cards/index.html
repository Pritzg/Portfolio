<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">

</head>

<body>
  <main id="playing-cards">
      <div class="card">
        <div class="left">
          <h2>A</h2>
          <p>♠</p>
        </div>
        <div class="middle">
          <p>♠</p>
        </div>
        <div class="right">
          <h2>A</h2>
          <p>♠</p>
        </div>
      </div>
      <div class="card">
        <div class="left">
          <h2>2</h2>
          <p>♣</p>
        </div>
        <div class="middle">
          <p>♣</p>
          <p id="bottom">♣</p>
        </div>
        <div class="right">
          <h2>2</h2>
          <p>♣</p>
        </div>
      </div>
      <div class="card">
        <div class="left">
          <h2 class="red">3</h2>
          <p class="red">♥</p>
        </div>
        <div class="middle">
          <p class="red">♥</p>
          <p class="red">♥</p>
          <p id="bottom" class="red">♥</p>
        </div>
        <div class="right">
          <h2 class="red">3</h2>
          <p class="red">♥</p>
        </div>
        </div>
        <div class="card">
        <div class="left">
          <h2>4</h2>
          <p>♣</p>
        </div>
        <div class="middle row-middle">
          <p>♣</p>
          <p>♣</p>
          <p id="bottom">♣</p>
          <p id="bottom">♣</p>
        </div>
        <div class="right">
          <h2>4</h2>
          <p>♣</p>
        </div>
  </main>

</body>

</html>
